<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Café Miner</title>
</head>
<body>
  <div id="crypto-cafe-game"></div>

  <script>
    const BACKEND_URL = 'https://cafe-miner.onrender.com';
    let carteira = localStorage.getItem('minhaCarteira') || '';
    let saldo = 0;

    async function criarCarteira() {
      const res = await fetch(`${BACKEND_URL}/criar-carteira`, { method: 'POST' });
      const data = await res.json();
      carteira = data.wallet;
      localStorage.setItem('minhaCarteira', carteira);
      atualizarTela();
      buscarSaldo();
    }

    async function buscarSaldo() {
      if (!carteira) return;
      const res = await fetch(`${BACKEND_URL}/saldo?wallet=${carteira}`);
      const data = await res.json();
      saldo = data.saldo || 0;
      atualizarTela();
    }

    async function minerar() {
      if (!carteira) await criarCarteira();
      const ganho = 0.00000001;
      await fetch(`${BACKEND_URL}/minerar`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ wallet: carteira, amount: ganho })
      });
      buscarSaldo();
    }

    function atualizarTela() {
      document.getElementById('crypto-cafe-game').innerHTML = `
        <div style="background:#1a1a1a;color:#0f0;font-family:monospace;padding:20px;border-radius:10px;max-width:400px;margin:50px auto;text-align:center">
          <h2>☕ Crypto Café Miner</h2>
          <p><b>Carteira:</b> ${carteira ? carteira.slice(0,10)+'...' : 'Clique em Iniciar'}</p>
          <p style="font-size:24px"><b>Saldo:</b> ${saldo.toFixed(8)} BTC</p>
          <button onclick="minerar()" style="background:#0f0;color:#000;padding:15px 30px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;font-size:18px">
            ⛏️ MINERAR
          </button>
          ${!carteira ? '<br><br><button onclick="criarCarteira()" style="background:#ff0;color:#000;padding:10px 20px;border:none;border-radius:5px;cursor:pointer">🚀 Criar Carteira</button>' : ''}
        </div>
      `;
    }

    atualizarTela();
    if (carteira) buscarSaldo();
  </script>
</body>
</html>
