<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Café Miner - LTC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0e14; 
            color: #fff; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            padding: 20px;
        }
       .header {
            background: #1a1f29;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #2a3142;
        }
       .carteira h3 { color: #4CAF50; margin-bottom: 10px; }
       .saldo { font-size: 24px; font-weight: bold; color: #4CAF50; }
       .btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }
       .btn:hover { background: #45a049; }
       .btn-saque { background: #f44336; }
       .btn-saque:hover { background: #da190b; }
       .sala {
            background: #1a1f29;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #2a3142;
        }
       .sala h3 { color: #2196F3; margin-bottom: 15px; }
       .slots {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
       .slot {
            background: #2a3142;
            border: 2px solid #3a4255;
            border-radius: 8px;
            height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
       .slot:hover { border-color: #4CAF50; transform: translateY(-5px); }
       .slot.vazio { color: #666; }
       .slot.ocupado { background: #1e3a2f; border-color: #4CAF50; }
       .maquina-nome { font-weight: bold; margin-bottom: 5px; }
       .hash { color: #4CAF50; font-size: 18px; }
       .stats {
            background: #1a1f29;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #2a3142;
            text-align: center;
        }
       .hash-total { font-size: 28px; color: #2196F3; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <h1>💎 Crypto Café Miner</h1>
        <div class="carteira">
            <h3>SUA CARTEIRA</h3>
            <div class="saldo"><span id="saldoLTC">0.00</span> LTC</div>
            <button class="btn" onclick="comprarLTC()">Comprar LTC</button>
            <button class="btn btn-saque" onclick="sacarLTC()">Retirar</button>
        </div>
    </div>

    <div class="stats">
        <div>HASH TOTAL</div>
        <div class="hash-total"><span id="hashTotal">0.00</span> H/s</div>
    </div>

    <div class="sala">
        <h3>🖥️ SALA INICIAL (<span id="slotsOcupados">0</span>/5)</h3>
        <p>Clique em um slot vazio para comprar um Servidor Básico por 10 LTC</p>
        <div class="slots" id="slotsContainer"></div>
    </div>

    <script>
        let saldoLTC = 100.00; // Começa com 100 LTC pra testar
        let maquinas = [];
        const PRECO_MAQUINA = 10;
        const HASH_MAQUINA = 2.5;
        const MAX_SLOTS = 5;

        function atualizarTela() {
            document.getElementById('saldoLTC').innerText = saldoLTC.toFixed(2);
            document.getElementById('slotsOcupados').innerText = maquinas.length;
            
            let hashTotal = maquinas.length * HASH_MAQUINA;
            document.getElementById('hashTotal').innerText = hashTotal.toFixed(2);
            
            const container = document.getElementById('slotsContainer');
            container.innerHTML = '';
            
            for (let i = 0; i < MAX_SLOTS; i++) {
                const slot = document.createElement('div');
                if (maquinas[i]) {
                    slot.className = 'slot ocupado';
                    slot.innerHTML = `
                        <div class="maquina-nome">Servidor Básico</div>
                        <div>v1</div>
                        <div class="hash">${HASH_MAQUINA} H/s</div>
                    `;
                } else {
                    slot.className = 'slot vazio';
                    slot.innerHTML = `
                        <div>VAZIO</div>
                        <div style="font-size:12px; margin-top:5px;">Clique pra comprar</div>
                    `;
                    slot.onclick = () => comprarMaquina(i);
                }
                container.appendChild(slot);
            }
        }

        function comprarMaquina(slot) {
            if (maquinas.length >= MAX_SLOTS) {
                alert('Sala lotada! 5/5');
                return;
            }
            if (saldoLTC >= PRECO_MAQUINA) {
                saldoLTC -= PRECO_MAQUINA;
                maquinas.push({ id: Date.now(), hash: HASH_MAQUINA });
                atualizarTela();
            } else {
                alert('LTC insuficiente! Você precisa de ' + PRECO_MAQUINA + ' LTC');
            }
        }

        function comprarLTC() {
            let valor = prompt('Quantos LTC deseja comprar?');
            if (valor &&!isNaN(valor)) {
                saldoLTC += parseFloat(valor);
                atualizarTela();
                alert(valor + ' LTC adicionados!');
            }
        }

        function sacarLTC() {
            let valor = prompt('Quantos LTC deseja sacar?\nDisponível: ' + saldoLTC.toFixed(2) + ' LTC');
            if (valor &&!isNaN(valor)) {
                valor = parseFloat(valor);
                if (valor <= saldoLTC && valor > 0) {
                    let endereco = prompt('Cole seu endereço Litecoin:');
                    if (endereco) {
                        saldoLTC -= valor;
                        atualizarTela();
                        alert('Saque de ' + valor + ' LTC solicitado para:\n' + endereco);
                    }
                } else {
                    alert('Valor inválido ou saldo insuficiente!');
                }
            }
        }

        // Mineração automática: ganha 0.01 LTC por máquina a cada 5 segundos
        setInterval(() => {
            let ganho = maquinas.length * 0.01;
            if (ganho > 0) {
                saldoLTC += ganho;
                atualizarTela();
            }
        }, 5000);

        atualizarTela();
    </script>
</body>
</html>
