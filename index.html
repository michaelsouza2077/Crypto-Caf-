<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Crypto Café Miner - LTC</title>
    <style>
        body { background: #0a0e14; color: #fff; font-family: Arial; padding: 20px; }
       .carteira { background: #1a1f29; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        button { background: #4CAF50; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        button:hover { background: #45a049; }
       .slot { background: #2a3142; width: 150px; height: 150px; display: inline-block; margin: 10px; border-radius: 8px; text-align: center; padding-top: 60px; }
        #enderecoLTC { background: #333; padding: 10px; border-radius: 5px; word-break: break-all; }
    </style>
</head>
<body>
    <h1>Crypto Café Miner</h1>
    
    <div class="carteira">
        <h3>💰 SUA CARTEIRA</h3>
        <p>MATIC no jogo: <span id="saldoMatic">0.00</span></p>
        <button onclick="conectarCarteira()">Conectar MetaMask</button>
        <p id="statusCarteira">Carteira não conectada</p>
    </div>

    <div class="carteira">
        <h3>⚡ DEPOSITAR LITECOIN</h3>
        <p>1. Envie LTC para este endereço:</p>
        <div id="enderecoLTC">LEtH7oWyyHX4b9sDNQe9NBZpnSpubXaWQH</div>
        <button onclick="copiarEndereco()">Copiar Endereço</button>
        <p>2. Após enviar, clique aqui:</p>
        <button onclick="verificarDeposito()">Já Depositei</button>
        <p><b>Taxa:</b> 1 LTC = 100 MATIC no jogo</p>
    </div>

    <h3>SALA INICIAL (<span id="salasOcupadas">0</span>/5)</h3>
    <div id="slots"></div>

    <script>
        let saldoMatic = 0;
        let carteiraConectada = null;
        let maquinas = [];

        // ENDEREÇO LTC DO JOGO - TROCA PELO SEU
        const ENDERECO_LTC_JOGO = "LEtH7oWyyHX4b9sDNQe9NBZpnSpubXaWQH";

        function conectarCarteira() {
            if (typeof window.ethereum!== 'undefined') {
                ethereum.request({ method: 'eth_requestAccounts' }).then(accounts => {
                    carteiraConectada = accounts[0];
                    document.getElementById('statusCarteira').innerText = `Conectado: ${carteiraConectada.slice(0,6)}...${carteiraConectada.slice(-4)}`;
                });
            } else {
                alert('Instala o MetaMask primeiro!');
            }
        }

        function copiarEndereco() {
            navigator.clipboard.writeText(ENDERECO_LTC_JOGO);
            alert('Endereço LTC copiado!');
        }

        function verificarDeposito() {
            if (!carteiraConectada) {
                alert('Conecta sua carteira primeiro!');
                return;
            }
            // AQUI VOCÊ PRECISA DE UMA API PRA CHECAR BLOCKCHAIN
            // Por enquanto vamos simular: adiciona 100 MATIC fake
            saldoMatic += 100;
            atualizarSaldo();
            alert('Depósito confirmado! +100 MATIC adicionados.');
        }

        function comprarMaquina() {
            if (saldoMatic >= 10) {
                saldoMatic -= 10;
                maquinas.push({tipo: 'Minerador Básico v1', hash: 5});
                atualizarSaldo();
                renderizarSlots();
            } else {
                alert('MATIC insuficiente! Deposite LTC.');
            }
        }

        function atualizarSaldo() {
            document.getElementById('saldoMatic').innerText = saldoMatic.toFixed(2);
        }

        function renderizarSlots() {
            const slotsDiv = document.getElementById('slots');
            slotsDiv.innerHTML = '';
            for (let i = 0; i < 5; i++) {
                if (maquinas[i]) {
                    slotsDiv.innerHTML += `<div class="slot">${maquinas[i].tipo}<br>${maquinas[i].hash} H/s</div>`;
                } else {
                    slotsDiv.innerHTML += `<div class="slot" onclick="comprarMaquina()">VAZIO<br>Clique pra comprar</div>`;
                }
            }
            document.getElementById('salasOcupadas').innerText = maquinas.length;
        }

        renderizarSlots();
    </script>
</body>
</html>
